<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>8‑Bit Lacrosse Coach</title>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; display:flex; justify-content:center; align-items:center; height:100dvh; width:100vw; overflow:hidden; font-family:monospace; touch-action:manipulation; }
        canvas { display:block; width:100%; max-width:500px; height:auto; image-rendering:pixelated; image-rendering:crisp-edges; border:4px solid #1e3a1e; box-shadow:0 0 30px #0f0a; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
(function() {
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const W = 480, H = 320;
    c.width = W; c.height = H;

    // ── Lacrosse States ─────────────────────
    const STATES = ['Maryland','New York','New Jersey','Pennsylvania','Massachusetts','Connecticut',
        'Virginia','North Carolina','Ohio','Michigan','Florida','California','Texas',
        'Colorado','Utah','Washington'];

    // ── Game State Variables ────────────────
    let app = 'TUTORIAL';  // TUTORIAL, MENU, TEAM_SELECT, SEASON_HUB, GAME, GAME_OVER, DRAFT, PLAYER_DEV, COACHING, CHAMPIONSHIP
    let menuIdx = 0, teamIdx = 0, hubIdx = 0, draftIdx = 0, devIdx = 0, tutorialStep = 0;
    let user = null, season = null, game = null, draftPool = [];
    let oc = { rating:1, cost:25, perks:[] }, dc = { rating:1, cost:25, perks:[] };
    let speed = 1, vol = 0.3, paused = false, celeb = 0, trans = 0, transTo = null;
    let msgText = '', msgTime = 0;

    // ── Audio Engine ────────────────────────
    let actx = null;
    function initAudio() { if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); }
    function beep(f,d,t='square',v=0.1) {
        if (!actx) return;
        const o = actx.createOscillator(), g = actx.createGain();
        o.type=t; o.frequency.value=f; g.gain.value=v*vol;
        o.connect(g); g.connect(actx.destination);
        o.start(); o.stop(actx.currentTime+d);
    }
    const sfx = {
        menu: ()=>beep(440,0.08), shoot: ()=>beep(220,0.15),
        check: ()=>beep(150,0.1,'triangle'), goal: ()=>{beep(660,0.2);setTimeout(()=>beep(880,0.2),100);},
        pass: ()=>beep(330,0.1), whistle: ()=>beep(550,0.05)
    };

    // ── Player Class ────────────────────────
    class Player {
        constructor(n,pos,s,sh,pa,ch,pot=0) {
            this.name=n; this.pos=pos; this.speed=s; this.shooting=sh;
            this.passing=pa; this.checking=ch; this.potential=pot;
            this.star = Math.min(5, ((s+sh+pa+ch)/8+1)>>0);
            this.fatigue=10; this.stats={goals:0,assists:0,saves:0,steals:0};
        }
    }
    const FIRST = ['Ace','Blaze','Cruz','Dax','Eli','Finn','Gage','Hawk','Iggy','Jett','Kai','Lex','Max','Nash','Ozzy','Pax','Quinn','Rex','Skye','Taz','Vince','Wes','Xander','York','Zane'];
    const LAST = ['Stone','Wolf','Fox','Shield','Hawk','Cage','Cross','Storm','Flare','Bolt','Rush','Dash','Blade','Fury','Steel','Knox','Strike','Cole','Kane','Voss'];
    function randName(){ return FIRST[Math.random()*FIRST.length|0]+' '+LAST[Math.random()*LAST.length|0]; }
    function makeRoster(){
        const pos=['A','A','M','D','G'], r=[];
        for(let p of pos){
            let s=3+(Math.random()*6|0), sh=3+(Math.random()*6|0), pa=3+(Math.random()*6|0), ch=3+(Math.random()*6|0);
            r.push(new Player(randName(),p,s,sh,pa,ch,Math.random()*3|0));
        }
        return r;
    }
    function makeTeam(st){ return {name:st,players:makeRoster(),color:'#'+(Math.random()*0xFFFFFF|0).toString(16).padStart(6,'0'),style:0}; }

    // ── Save / Load ─────────────────────────
    function save(){
        if(!user)return;
        const d={u:user,s:season,oc,dc,sp:speed,vol,st:app==='GAME'?'SEASON_HUB':app};
        localStorage.setItem('laxEff',JSON.stringify(d));
    }
    function load(){
        const raw=localStorage.getItem('laxEff');
        if(!raw)return false;
        try{
            const d=JSON.parse(raw); user=d.u; season=d.s;
            if(d.oc)oc=d.oc; if(d.dc)dc=d.dc;
            if(d.sp)speed=d.sp; if(d.vol)vol=d.vol;
            app=d.st; return true;
        }catch(e){return false;}
    }

    // ── Input (Touch + Mouse) ───────────────
    let joy={active:false,bx:80,by:H-80,sx:80,sy:H-80,rad:50};
    let btnA={press:false,just:false,hold:0};
    let btnB={press:false,just:false,hold:0};
    const ZA={x:W-100,y:H-130,w:70,h:60}, ZB={x:W-100,y:H-60,w:70,h:60};
    let rect=c.getBoundingClientRect();
    window.addEventListener('resize',()=>rect=c.getBoundingClientRect());

    function getXY(cx,cy){ return {x:(cx-rect.left)*(W/rect.width), y:(cy-rect.top)*(H/rect.height)}; }
    c.addEventListener('touchstart',e=>{
        e.preventDefault();
        for(let t of e.changedTouches){
            const {x,y}=getXY(t.clientX,t.clientY);
            if(x<W/2&&!joy.active){ joy.active=true; joy.bx=x; joy.by=y; joy.sx=x; joy.sy=y; }
            if(x>ZA.x&&x<ZA.x+ZA.w&&y>ZA.y&&y<ZA.y+ZA.h){ btnA.press=true; btnA.just=true; }
            if(x>ZB.x&&x<ZB.x+ZB.w&&y>ZB.y&&y<ZB.y+ZB.h){ btnB.press=true; btnB.just=true; }
        }
    },{passive:false});
    c.addEventListener('touchmove',e=>{
        e.preventDefault();
        for(let t of e.changedTouches){
            const {x,y}=getXY(t.clientX,t.clientY);
            if(joy.active){
                let dx=x-joy.bx, dy=y-joy.by, dist=Math.sqrt(dx*dx+dy*dy);
                if(dist>joy.rad){ dx=dx/dist*joy.rad; dy=dy/dist*joy.rad; }
                joy.sx=joy.bx+dx; joy.sy=joy.by+dy;
            }
        }
    },{passive:false});
    c.addEventListener('touchend',e=>{ e.preventDefault(); joy.active=false; btnA.press=false; btnB.press=false; });
    c.addEventListener('touchcancel',e=>{ e.preventDefault(); joy.active=false; btnA.press=false; btnB.press=false; });
    // mouse support for desktop debugging
    c.addEventListener('mousedown',e=>{
        e.preventDefault();
        const {x,y}=getXY(e.clientX,e.clientY);
        if(x<W/2){ joy.active=true; joy.bx=x; joy.by=y; joy.sx=x; joy.sy=y; }
        if(x>ZA.x&&x<ZA.x+ZA.w&&y>ZA.y&&y<ZA.y+ZA.h){ btnA.press=true; btnA.just=true; }
        if(x>ZB.x&&x<ZB.x+ZB.w&&y>ZB.y&&y<ZB.y+ZB.h){ btnB.press=true; btnB.just=true; }
    });
    c.addEventListener('mousemove',e=>{
        if(!joy.active)return; e.preventDefault();
        const {x,y}=getXY(e.clientX,e.clientY);
        let dx=x-joy.bx, dy=y-joy.by, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>joy.rad){ dx=dx/dist*joy.rad; dy=dy/dist*joy.rad; }
        joy.sx=joy.bx+dx; joy.sy=joy.by+dy;
    });
    c.addEventListener('mouseup',e=>{ e.preventDefault(); joy.active=false; btnA.press=false; btnB.press=false; });
    c.addEventListener('contextmenu',e=>e.preventDefault());

    function getDir(){
        if(!joy.active)return{dx:0,dy:0};
        let dx=joy.sx-joy.bx, dy=joy.sy-joy.by, mag=Math.sqrt(dx*dx+dy*dy);
        if(mag<8)return{dx:0,dy:0};
        return{dx:dx/mag, dy:dy/mag};
    }

    // ── Transitions ─────────────────────────
    function go(st){ if(!transTo){ transTo=st; trans=0; } }
    function updateTrans(){
        if(!transTo)return;
        trans+=0.06;
        if(trans>=1){ app=transTo; transTo=null; trans=0; }
    }

    // ── New Season ──────────────────────────
    function newSeason(){
        user=makeTeam(STATES[teamIdx]);
        oc={rating:1,cost:25,perks:[]}; dc={rating:1,cost:25,perks:[]};
        season={w:0,l:0,gp:0,xp:200,sch:[],idx:0,over:false,rival:{}};
        for(let i=0;i<12;i++){
            let opp;
            do{ opp=STATES[Math.random()*STATES.length|0]; }while(opp===user.name);
            season.sch.push({op:opp,played:false,res:null});
        }
        go('SEASON_HUB'); save();
    }

    // ── Start Game ──────────────────────────
    function startGame(){
        if(season.idx>=season.sch.length){ season.over=true; go(season.w>=8?'CHAMPIONSHIP':'SEASON_HUB'); save(); return; }
        const opp=makeTeam(season.sch[season.idx].op);
        game={
            home:user, away:opp, sh:0, sa:0, timer:(150*speed)|0, poss:0,
            bc:2, pHome:user.players.map((p,i)=>({x:0,y:0,idx:i,a:0})),
            pAway:opp.players.map((p,i)=>({x:0,y:0,idx:i,a:0})),
            ai:opp.players.reduce((s,p)=>s+p.speed+p.shooting+p.passing+p.checking,0)/5>25?'hard':'medium',
            uc:0, oneT:0, wind:false, windPow:0
        };
        resetPositions();
        app='GAME'; celeb=0;
    }

    const HP=[{x:100,y:100},{x:120,y:200},{x:190,y:150},{x:240,y:80},{x:260,y:260}];
    const AP=[{x:380,y:100},{x:360,y:200},{x:290,y:150},{x:240,y:80},{x:220,y:260}];
    function resetPositions(){
        for(let i=0;i<5;i++){ game.pHome[i].x=HP[i].x; game.pHome[i].y=HP[i].y; }
        for(let i=0;i<5;i++){ game.pAway[i].x=AP[i].x; game.pAway[i].y=AP[i].y; }
        game.bc=game.poss?2:2;
        game.wind=false; game.windPow=0;
    }

    // ── Game Logic ──────────────────────────
    function updateGame(){
        if(!game||paused)return;
        if(celeb>0){ celeb--; if(celeb===0)resetPositions(); return; }
        game.timer--;
        if(game.timer<=0){ endGame(); return; }
        msgTime=Math.max(0,msgTime-1);

        const dir=getDir();
        if(game.poss===0&&game.uc===game.bc){
            const p=game.pHome[game.uc], spd=user.players[game.uc].speed*0.8*(user.players[game.uc].fatigue/10);
            p.x+=dir.dx*spd; p.y+=dir.dy*spd; p.a=(p.a+0.1)&1;
        } else if(game.poss===1){
            const p=game.pHome[game.uc], spd=user.players[game.uc].speed*0.9;
            p.x+=dir.dx*spd; p.y+=dir.dy*spd;
        }
        for(const p of game.pHome){ p.x=Math.max(15,Math.min(W-15,p.x)); p.y=Math.max(20,Math.min(H-20,p.y)); }
        for(const p of game.pAway){ p.x=Math.max(15,Math.min(W-15,p.x)); p.y=Math.max(20,Math.min(H-20,p.y)); }

        moveAI();

        if(btnA.just){ btnA.just=false; handleA(); }
        if(btnB.just){ btnB.just=false; handleB(); }

        if(btnA.press&&game.poss===0&&game.uc===game.bc){
            game.wind=true; game.windPow=Math.min(10,game.windPow+0.4);
        } else if(game.wind&&!btnA.press){
            shoot(true); game.wind=false; game.windPow=0;
        }
        game.oneT=Math.max(0,game.oneT-1);
        if(btnA.just&&game.poss===0&&game.oneT>0&&game.uc===game.bc&&game.pHome[game.bc].x>W-110){
            if(Math.random()*10<user.players[game.bc].shooting+2){ score(); msgText='ONE-TIMER!'; msgTime=30; }
        }
    }

    function handleA(){
        if(game.poss===0){
            if(game.wind){ shoot(true); game.wind=false; game.windPow=0; }
            else if(game.pHome[game.bc].x>W-110) shoot(false);
        } else {
            const d=game.pHome[game.uc], c=game.pAway[game.bc];
            if(Math.hypot(d.x-c.x,d.y-c.y)<38){
                const chk=user.players[game.uc].checking+(dc.perks.includes('Hard Check')?1:0);
                if(Math.random()*10<chk) steal();
                else { msgText='Miss'; msgTime=15; }
            }
        }
    }

    function handleB(){
        if(game.poss===0){
            const passer=game.pHome[game.bc], mates=game.pHome.filter((_,i)=>i!==game.bc);
            const nearest=mates.reduce((a,b)=>Math.hypot(passer.x-a.x,passer.y-a.y)<Math.hypot(passer.x-b.x,passer.y-b.y)?a:b);
            const skill=user.players[game.bc].passing+(oc.perks.includes('Quick Pass')?1:0);
            if(Math.random()*10<skill){
                game.bc=nearest.idx; msgText='Pass'; msgTime=15; game.oneT=25; sfx.pass();
                user.players[game.bc].stats.assists++;
            } else { game.poss=1; game.bc=2; msgText='Intercepted'; msgTime=25; sfx.whistle(); }
        } else {
            const d=game.pHome[game.uc], c=game.pAway[game.bc];
            if(Math.hypot(d.x-c.x,d.y-c.y)<45){
                const lift=user.players[game.uc].checking+(dc.perks.includes('Stick Lift+')?1.5:0);
                if(Math.random()*10<lift) steal();
                else { msgText='Miss lift'; msgTime=15; }
            } else {
                const defs=game.pHome.map((_,i)=>i).filter(i=>i!==4);
                const cur=defs.indexOf(game.uc);
                game.uc=defs[(cur+1)%defs.length];
            }
        }
    }

    function shoot(charged){
        const p=game.pHome[game.bc];
        if(p.x<W-110)return;
        const power=user.players[game.bc].shooting+(oc.perks.includes('Deadeye')?1.5:0)+(charged?game.windPow*0.7:0);
        const gk=game.pAway[4], gkSkill=game.away.players[4].checking+(dc.perks.includes('Goalie Commander')?1:0);
        if(Math.random()*12<gkSkill&&Math.abs(gk.y-p.y)<75){ msgText='SAVED!'; msgTime=25; game.poss=1; sfx.shoot(); }
        else if(Math.random()*10<power){ score(); }
        else { msgText='WIDE'; msgTime=20; game.poss=1; sfx.shoot(); }
        resetPositions();
    }

    function score(){ game.sh++; msgText='GOAL!'; msgTime=40; game.poss=1; sfx.goal(); celeb=30; user.players[game.bc].stats.goals++; }
    function steal(){ game.poss=0; game.bc=game.uc; msgText='Stolen!'; msgTime=30; sfx.check(); user.players[game.uc].stats.steals++; }

    function moveAI(){
        if(game.poss===1){
            const c=game.pAway[game.bc];
            c.x-=game.away.players[game.bc].speed*0.4;
            c.y+=c.y<H/2?0.5:-0.5;
            for(const p of game.pAway) if(p.idx!==game.bc){ p.x+=(200-p.x)*0.005; p.y+=(150-p.y)*0.005; }
        } else {
            const ball=game.pHome[game.bc];
            for(const p of game.pAway) if(p.idx!==game.bc){ p.x+=(ball.x-p.x)*0.03; p.y+=(ball.y-p.y)*0.03; }
        }
    }

    function endGame(){
        if(game.sh>game.sa){ season.w++; season.xp+=60; if(season.rival[game.away.name])season.xp+=20; }
        else { season.l++; season.xp+=25; }
        season.rival[game.away.name]=(season.rival[game.away.name]||0)+1;
        season.sch[season.idx].played=true; season.sch[season.idx].res=game.sh>game.sa?'W':'L';
        season.gp++; season.idx++;
        for(const p of user.players) p.fatigue=Math.max(3,p.fatigue-2);
        app='GAME_OVER'; save();
    }

    // ── Rendering ───────────────────────────
    function drawField(){
        ctx.fillStyle='#1a5c1a'; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle='#fff'; ctx.lineWidth=3;
        ctx.strokeRect(10,10,W-20,H-20);
        ctx.beginPath(); ctx.moveTo(W/2,20); ctx.lineTo(W/2,H-20); ctx.stroke();
        ctx.beginPath(); ctx.arc(W/2,H/2,50,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.fillRect(0,H/2-30,8,60); ctx.fillRect(W-8,H/2-30,8,60);
    }

    function ptext(t,x,y,c='#fff',s=10){
        ctx.font = s+'px monospace'; ctx.fillStyle=c; ctx.fillText(t,x,y);
    }

    function renderGame(){
        if(!game)return;
        drawField();
        for(const p of game.pHome){
            ctx.fillStyle=user.color; ctx.fillRect(p.x-6,p.y-6,12,12);
            if(p.idx===game.bc&&game.poss===0){ ctx.fillStyle='#fff'; ctx.fillRect(p.x-8,p.y-8,16,16); }
            if(p.idx===game.uc&&game.poss===1){ ctx.strokeStyle='#0ff'; ctx.lineWidth=2; ctx.strokeRect(p.x-8,p.y-8,16,16); }
        }
        for(const p of game.pAway){
            ctx.fillStyle=game.away.color; ctx.fillRect(p.x-6,p.y-6,12,12);
            if(p.idx===game.bc&&game.poss===1){ ctx.fillStyle='#fff'; ctx.fillRect(p.x-8,p.y-8,16,16); }
        }
        ctx.fillStyle='#000a'; ctx.fillRect(150,0,180,28);
        ptext(`${user.name} ${game.sh}-${game.sa} ${game.away.name}`,5,20,'#fff',7);
        const sec=game.timer/60|0, ds=game.timer%60;
        ptext(`${sec}:${ds<10?'0'+ds:ds}`,200,42,'#ff0',7);
        if(msgTime) ptext(msgText,150,80,'#ff0',9);
        if(game.wind) ctx.fillRect(game.pHome[game.bc].x-15,game.pHome[game.bc].y-25,game.windPow*3,5);
        // joystick
        ctx.strokeStyle='#fff4'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(joy.bx,joy.by,joy.rad,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(joy.sx,joy.sy,16,0,Math.PI*2); ctx.fill();
        // buttons
        ctx.fillStyle=btnA.press?'#0f0':'#0a0'; ctx.fillRect(ZA.x,ZA.y,ZA.w,ZA.h);
        ptext(game.poss===0?'SHOOT':'CHECK',ZA.x+5,ZA.y+38,'#000',8);
        ctx.fillStyle=btnB.press?'#f00':'#a00'; ctx.fillRect(ZB.x,ZB.y,ZB.w,ZB.h);
        ptext(game.poss===0?'PASS':'LIFT',ZB.x+10,ZB.y+38,'#000',8);
        ctx.fillStyle='#fffa'; ctx.fillRect(W-30,10,20,20); ptext('⏸',W-26,26,'#000',8);
        if(celeb) ptext('GOOOAL!',160,150,'#ff0',18);
    }

    // ── Other Screens ───────────────────────
    function renderTutorial(){
        drawField();
        ptext('HOW TO PLAY',120,40,'#ff0');
        const steps=['Move with joystick','A: Shoot (hold power)','B: Pass / Stick Lift','Defense: A check, B switch','Win games, earn XP!'];
        for(let i=0;i<steps.length;i++) ptext(steps[i],50,100+i*25,i===tutorialStep?'#0f0':'#aaa',7);
        ptext('A: Next',150,270,'#fff');
    }
    function renderMenu(){
        drawField();
        ptext('8-BIT LACROSSE',90,50,'#ff0',12);
        ptext('New Season',140,130,menuIdx===0?'#0f0':'#aaa');
        if(localStorage.getItem('laxEff')) ptext('Continue',140,165,menuIdx===1?'#0f0':'#aaa');
        ptext('A: Select',150,270,'#fff',8);
    }
    function renderTeamSelect(){
        drawField();
        ptext('CHOOSE STATE',120,40,'#ff0');
        const start=Math.max(0,Math.min(teamIdx-3,STATES.length-7));
        for(let i=start;i<start+7&&i<STATES.length;i++) ptext(STATES[i],60,100+(i-start)*28,i===teamIdx?'#0f0':'#ccc',8);
    }
    function renderHub(){
        drawField();
        ptext(user.name,150,25,'#0f0'); ptext(`W:${season.w} L:${season.l}`,100,55,'#fff',7);
        ptext(`XP: ${season.xp}`,330,55,'#ff0',7);
        const opts=['Play Game','Development','Coaching','Draft (after 4 games)'];
        for(let i=0;i<opts.length;i++) ptext(opts[i],30,110+i*30,hubIdx===i?'#0f0':'#aaa',8);
        if(season.gp>=4&&season.gp%4===0&&draftPool.length===0&&hubIdx===3) ptext('<- available!',320,200,'#ff0',6);
    }
    function renderDraft(){
        drawField();
        ptext('DRAFT - PICK 3',120,30,'#ff0');
        if(draftPool.length<=7) ptext(`Picks left: ${draftPool.length-7}`,310,30,'#fff',7);
        const start=Math.max(0,draftIdx-2);
        for(let i=start;i<start+5&&i<draftPool.length;i++){
            const p=draftPool[i];
            ptext(`${p.name} ${'★'.repeat(p.star)}`,25,90+(i-start)*24,i===draftIdx?'#0f0':'#aaa',7);
        }
        ptext('A: Draft',110,260,'#fff',8);
    }
    function renderDev(){
        drawField();
        ptext('PLAYER DEV',70,25,'#ff0'); ptext(`XP: ${season.xp}`,340,25,'#ff0',7);
        for(let i=0;i<user.players.length;i++){
            const p=user.players[i];
            ptext(`${p.name} (${p.pos}) ★${p.star}`,15,75+i*30,devIdx===i?'#0f0':'#ccc',7);
            ptext(`S:${p.speed} SH:${p.shooting} P:${p.passing} C:${p.checking}`,15,95+i*30,'#aaa',5);
        }
        ptext('A: Upgrade (30 XP)',90,270,'#fff',7);
        ptext('B: Rest (+2 fatigue, 20 XP)',60,290,'#aaa',6);
    }
    function renderCoach(){
        drawField();
        ptext('COACHING STAFF',100,30,'#ff0');
        ptext(`OC Lv.${oc.rating} Cost:${oc.cost}`,20,90,'#fff',7); ptext(`Perks: ${oc.perks.join(',')}`,20,115,'#aa0',6);
        ptext(`DC Lv.${dc.rating} Cost:${dc.cost}`,20,160,'#fff',7); ptext(`Perks: ${dc.perks.join(',')}`,20,185,'#aa0',6);
        ptext('A: Upgrade OC  B: Upgrade DC',40,250,'#fff',7);
    }
    function renderChamp(){
        drawField();
        ptext('CHAMPIONSHIP!',120,100,'#ff0'); ptext('You are the champion!',70,150,'#fff');
    }

    // ── Main Render & Update ────────────────
    function render(){
        ctx.clearRect(0,0,W,H);
        if(app==='TUTORIAL') renderTutorial();
        else if(app==='MENU') renderMenu();
        else if(app==='TEAM_SELECT') renderTeamSelect();
        else if(app==='SEASON_HUB') renderHub();
        else if(app==='GAME'||app==='GAME_OVER') renderGame();
        else if(app==='DRAFT') renderDraft();
        else if(app==='PLAYER_DEV') renderDev();
        else if(app==='COACHING') renderCoach();
        else if(app==='CHAMPIONSHIP') renderChamp();
        if(transTo){
            const a=trans<0.5?trans*2:(1-trans)*2;
            ctx.fillStyle=`rgba(0,0,0,${a})`; ctx.fillRect(0,0,W,H);
        }
    }

    function update(){
        updateTrans();
        if(paused)return;
        if(app==='TUTORIAL'&&btnA.just){ btnA.just=false; tutorialStep++; if(tutorialStep>=5) go('MENU'); }
        else if(app==='MENU'){
            if(btnA.just){ btnA.just=false; if(menuIdx===0) go('TEAM_SELECT'); else if(menuIdx===1&&load()) go('SEASON_HUB'); }
            const d=getDir(); if(d.dy>0.5) menuIdx=Math.min(1,menuIdx+1); if(d.dy<-0.5) menuIdx=Math.max(0,menuIdx-1);
        } else if(app==='TEAM_SELECT'){
            if(btnA.just){ btnA.just=false; newSeason(); }
            const d=getDir(); if(d.dy>0.5) teamIdx=Math.min(STATES.length-1,teamIdx+1); if(d.dy<-0.5) teamIdx=Math.max(0,teamIdx-1);
        } else if(app==='SEASON_HUB'){
            if(btnA.just){
                btnA.just=false;
                if(hubIdx===0) startGame();
                else if(hubIdx===1) go('PLAYER_DEV');
                else if(hubIdx===2) go('COACHING');
                else if(hubIdx===3&&season.gp>=4&&season.gp%4===0){
                    draftPool=[];
                    for(let i=0;i<10;i++){
                        const p=makeRoster()[0]; p.star=Math.min(5,((p.speed+p.shooting+p.passing+p.checking)/8+1)|0);
                        draftPool.push(p);
                    }
                    go('DRAFT');
                }
            }
            const d=getDir(); if(d.dy>0.5)hubIdx=Math.min(3,hubIdx+1); if(d.dy<-0.5)hubIdx=Math.max(0,hubIdx-1);
        } else if(app==='DRAFT'){
            if(btnA.just&&draftPool.length){
                const chosen=draftPool[draftIdx];
                let lowest=0;
                for(let i=1;i<user.players.length;i++) if(user.players[i].speed+user.players[i].shooting+user.players[i].passing+user.players[i].checking < user.players[lowest].speed+user.players[lowest].shooting+user.players[lowest].passing+user.players[lowest].checking) lowest=i;
                user.players[lowest]=chosen; draftPool.splice(draftIdx,1); draftIdx=0;
                if(draftPool.length<=7)go('SEASON_HUB');
            }
            const d=getDir(); if(d.dy>0.5)draftIdx=Math.min(draftPool.length-1,draftIdx+1); if(d.dy<-0.5)draftIdx=Math.max(0,draftIdx-1);
        } else if(app==='PLAYER_DEV'){
            if(btnA.just&&season.xp>=30){
                const p=user.players[devIdx];
                const attr=['speed','shooting','passing','checking'][Math.random()*4|0];
                p[attr]=Math.min(10,p[attr]+1);
                p.star=Math.min(5,((p.speed+p.shooting+p.passing+p.checking)/8+1)|0);
                season.xp-=30; save();
            }
            if(btnB.just&&season.xp>=20){ user.players[devIdx].fatigue=Math.min(10,user.players[devIdx].fatigue+2); season.xp-=20; save(); }
            const d=getDir(); if(d.dy>0.5)devIdx=Math.min(4,devIdx+1); if(d.dy<-0.5)devIdx=Math.max(0,devIdx-1);
        } else if(app==='COACHING'){
            if(btnA.just&&season.xp>=oc.cost){
                season.xp-=oc.cost; oc.rating++; oc.cost=(oc.cost*1.5)|0;
                const perk=oc.perks.length<2?['Quick Pass','Deadeye','Extra Stamina','Vision'][Math.random()*4|0]:null;
                if(perk&&!oc.perks.includes(perk))oc.perks.push(perk); save();
            }
            if(btnB.just&&season.xp>=dc.cost){
                season.xp-=dc.cost; dc.rating++; dc.cost=(dc.cost*1.5)|0;
                const perk=dc.perks.length<2?['Hard Check','Goalie Commander','Stick Lift+','Pressure'][Math.random()*4|0]:null;
                if(perk&&!dc.perks.includes(perk))dc.perks.push(perk); save();
            }
            if(getDir().dx<-0.5)go('SEASON_HUB');
        } else if(app==='GAME'){
            updateGame();
        } else if(app==='GAME_OVER'){
            if(btnA.just&&!transTo){ btnA.just=false; if(season.idx>=12||season.over)go(season.w>=8?'CHAMPIONSHIP':'SEASON_HUB'); else go('SEASON_HUB'); }
        } else if(app==='CHAMPIONSHIP'){
            if(btnA.just)go('SEASON_HUB');
        }
    }

    function loop(){ update(); render(); requestAnimationFrame(loop); }
    if(!load()){ app='TUTORIAL'; tutorialStep=0; }
    loop();
})();
    </script>
</body>
</html>
